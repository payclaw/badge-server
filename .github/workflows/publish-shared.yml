name: Publish @kyalabs/shared-identity

on:
  push:
    tags:
      - 'shared-identity-v*'

concurrency:
  group: publish-shared-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Refusing publish: tagged commit is not on origin/main"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build
        run: npm run build -w packages/shared

      - name: Test
        run: npm run test -w packages/shared -- run

      - name: Verify version matches tag
        working-directory: packages/shared
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#shared-identity-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Publishing @kyalabs/shared-identity@$PKG_VERSION"

      - name: Publish
        working-directory: packages/shared
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
